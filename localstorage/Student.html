<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schülerkartei</title>
    <link rel="stylesheet" href="student.css" />
    <script>
      const firstNames = ["Peter", "Markus", "Franz", "Karl"];
      const lastNames = ["Müller", "Meier", "Schmidt", "Mustermann"];
      const ages = ["7", "9", "10", "39"];

      // neues Array mit Studentdaten erstellen
      let students = [];

      document.addEventListener("DOMContentLoaded", loadFromLocalstorage);

      // students im Localstorage abspeichern
      function saveToLocalstorage() {
        localStorage.setItem("students", JSON.stringify(students));
      }
      // Laden aus dem Localstorage
      function loadFromLocalstorage() {
        const studentsFromStorage = JSON.parse(
          localStorage.getItem("students"),
        );

        if (studentsFromStorage !== null) {
          students = studentsFromStorage;

          // Jeden gespeicherten Schüler durch die Helfer-Funktion jagen
          students.forEach(function (student) {
            createStudentHTML(student);
          });
        }
      }

      //HTML Baukasten Funktion

      function createStudentHTML(studentData) {
        // 1. Hauptkarte
        const cardIndex = document.createElement("div");
        cardIndex.classList.add("Index");
        cardIndex.id = studentData.id;

        // 2. Inhalte
        const firstName = document.createElement("div");
        firstName.textContent = "Vorname: " + studentData.vornamen;
        firstName.classList.add("fname");

        const lastName = document.createElement("div");
        lastName.textContent = "Nachname: " + studentData.nachnamen;
        lastName.classList.add("lname");

        const age = document.createElement("div");
        age.textContent = "Alter: " + studentData.alter;
        age.classList.add("ageNumber");

        // 3. Lösch-Button
        const newButton = document.createElement("button");
        newButton.classList.add("deleteButton");
        newButton.textContent = "Löschen";

        newButton.onclick = function () {
          cardIndex.remove();
          // Löschen über die ID des übergebenen Schülers
          const index = students.findIndex((s) => s.id === studentData.id);
          if (index > -1) {
            students.splice(index, 1);
            saveToLocalstorage();
          }
        };

        // 4. Zusammenbauen
        cardIndex.appendChild(firstName);
        cardIndex.appendChild(lastName);
        cardIndex.appendChild(age);
        cardIndex.appendChild(newButton);

        document.getElementById("wrapper").appendChild(cardIndex);
      }

      // angepasste NewStudent funktion mit implementierter HTML Baukasten Funktion

      function addNewStudent() {
        const uniqueId = Date.now();

        // Zufallswerte ermitteln
        const randomFirstName =
          firstNames[Math.floor(Math.random() * firstNames.length)];
        const randomLastName =
          lastNames[Math.floor(Math.random() * lastNames.length)];
        const randomAge = ages[Math.floor(Math.random() * ages.length)];

        // Datenpaket schnüren
        const newStudentData = {
          id: uniqueId,
          vornamen: randomFirstName,
          nachnamen: randomLastName,
          alter: randomAge,
        };

        // Speichern
        students.push(newStudentData);
        saveToLocalstorage();

        // BÄM! HTML bauen lassen:
        createStudentHTML(newStudentData);
      }
    </script>
  </head>
  <body>
    <button onclick="addNewStudent()">ADD</button>
    <div id="wrapper"></div>
  </body>
</html>
