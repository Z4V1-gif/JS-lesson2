<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kapitel 2</title>
    <script>
      // Objekte erzeugen
      // Objekte auf Konsole ausgeben
      const person = {
        haircolor: "green",
        eyecolor: "brown",
        height: "1.83cm",
        weight: "80 Kg",
        bodytype: "athlet",
        gender: "male",
        age: 40,
      };

      const car = {
        /*Ein Objekt ist eine Zusammenfassung von attributen, Werten etc., bzw beschreibt eine Variable */
        ps: 1000,
        color: "black",
        company: "porsche",
        model: "Turbo S",
        productionYear: 2020,
        kilometer: 300,
        owner: [person],
      };

      console.log(car);
      // Attribute auf Konsole ausgeben
      console.log(car.ps);
      console.log(car.color);
      console.log(car.owner[0]);
      console.log(person);
      car.ps = 200;
      console.log(car);
      // Neue Attribute in bestehendes Objekt einfügen
      car.seats = 5;
      console.log(car.seats);

      //Objekte per For auslesen
      for (let key in car) {
        if (key === "ps") {
          console.log(key, car[key]);
        }
      }
    </script>
  </head>
  <body></body>
</html>
