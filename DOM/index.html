<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <div class="card-header"><h1>Title of Card</h1></div>
      <div class="card-body">
        <img
          src="https://cdn.pixabay.com/photo/2016/04/15/17/26/box-1331470_960_720.jpg"
          alt="Boxing Gloves"
        />
      </div>
      <div class="card-footer">
        <button
          onclick="
            like(
              'https://cdn.pixabay.com/photo/2016/04/15/17/26/box-1331470_960_720.jpg',
            )
          "
        >
          Like
        </button>
        <button
          onclick="
            dislike(
              'https://cdn.pixabay.com/photo/2016/04/15/17/26/box-1331470_960_720.jpg',
            )
          "
        >
          Dislike
        </button>
      </div>
    </div>
    <button onclick="addNewByString()">Add by String</button>
    <button onclick="addNew()">Add New</button>
  </body>
</html>
